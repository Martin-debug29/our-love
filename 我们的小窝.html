<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的小窝</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #fff5f7; color: #333; }
  .header { background: #fff; border-bottom: 1px solid #fce4ec; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 22px; font-weight: 600; color: #e91e63; }
  .nav { display: flex; gap: 4px; background: #fff; padding: 10px 20px; border-bottom: 1px solid #fce4ec; flex-wrap: wrap; }
  .nav-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #f8bbd0; background: #fff; color: #e91e63; font-size: 14px; cursor: pointer; }
  .nav-btn.active { background: #e91e63; color: #fff; }
  .main { max-width: 800px; margin: 0 auto; padding: 20px; }
  .page { display: none; }
  .page.active { display: block; }
  .card { background: #fff; border-radius: 16px; border: 1px solid #fce4ec; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 16px; font-weight: 500; color: #e91e63; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; color: #999; margin-bottom: 4px; display: block; }
  input, select, textarea { width: 100%; padding: 10px; border: 1px solid #fce4ec; border-radius: 8px; font-size: 14px; font-family: inherit; }
  textarea { min-height: 100px; resize: vertical; }
  .btn { background: #e91e63; color: #fff; border: none; padding: 12px 24px; border-radius: 20px; font-size: 14px; cursor: pointer; display: inline-block; }
  .btn-outline { background: #fff; color: #e91e63; border: 1px solid #f8bbd0; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: #fff; border-radius: 12px; border: 1px solid #fce4ec; padding: 16px; text-align: center; }
  .stat-card .s-num { font-size: 24px; font-weight: 600; color: #e91e63; }
  .stat-card .s-label { font-size: 12px; color: #aaa; margin-top: 4px; }
  .diary-item { padding: 12px; border-bottom: 1px solid #fce4ec; cursor: pointer; }
  .diary-item:hover { background: #fff5f7; }
  .diary-item .d-title { font-weight: 500; margin-bottom: 4px; }
  .diary-item .d-date { font-size: 12px; color: #999; }
  .diary-item .d-author { font-size: 11px; background: #fce4ec; color: #e91e63; padding: 2px 8px; border-radius: 10px; }
  .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .modal.show { display: flex; }
  .modal-content { background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
  .modal-title { font-size: 16px; font-weight: 500; color: #e91e63; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 24px; border-radius: 20px; font-size: 14px; z-index: 200; }
  .empty { text-align: center; color: #ccc; padding: 30px; }
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
  .photo-item { aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #fce4ec; cursor: pointer; }
  .photo-item img { width: 100%; height: 100%; object-fit: cover; }
  .wish-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #fce4ec; }
  .wish-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #f48fb1; cursor: pointer; }
  .wish-check.done { background: #e91e63; border-color: #e91e63; }
  .wish-text { flex: 1; }
  .wish-text.done { color: #ccc; text-decoration: line-through; }
  .ann-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #fce4ec; }
  .ann-badge { background: #fce4ec; color: #e91e63; font-size: 12px; padding: 4px 10px; border-radius: 12px; }
  @media (max-width: 600px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-title" id="site-title">我们的小窝</div>
  <div id="sync-indicator" style="font-size:12px;color:#999;">本地模式</div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="switchPage('home')">首页</button>
  <button class="nav-btn" onclick="switchPage('diary')">日记</button>
  <button class="nav-btn" onclick="switchPage('album')">相册</button>
  <button class="nav-btn" onclick="switchPage('anniversary')">纪念日</button>
  <button class="nav-btn" onclick="switchPage('wishlist')">心愿</button>
  <button class="nav-btn" onclick="switchPage('settings')">设置</button>
</div>

<div class="main">
  <!-- 首页 -->
  <div class="page active" id="page-home">
    <div class="card" style="text-align:center;">
      <div style="font-size:18px;color:#e91e63;margin-bottom:10px;" id="home-names">❤ 你和我 ❤</div>
      <div style="font-size:60px;font-weight:600;color:#e91e63;" id="love-days">0</div>
      <div style="color:#999;">在一起的第 <span id="love-days2">0</span> 天</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="s-num" id="stat-diary">0</div><div class="s-label">日记</div></div>
      <div class="stat-card"><div class="s-num" id="stat-photo">0</div><div class="s-label">照片</div></div>
      <div class="stat-card"><div class="s-num" id="stat-wish">0</div><div class="s-label">心愿</div></div>
      <div class="stat-card"><div class="s-num" id="stat-ann">0</div><div class="s-label">纪念日</div></div>
    </div>
    <div class="card">
      <div class="card-title">最近日记</div>
      <div id="home-diary-list"><div class="empty">还没有日记</div></div>
    </div>
  </div>

  <!-- 日记 -->
  <div class="page" id="page-diary">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-weight:500;color:#e91e63;">日记本</div>
      <button class="btn" onclick="openDiaryModal()">写日记</button>
    </div>
    <div class="card"><div id="diary-list"><div class="empty">还没有日记</div></div></div>
  </div>

  <!-- 相册 -->
  <div class="page" id="page-album">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-weight:500;color:#e91e63;">相册</div>
      <button class="btn" onclick="document.getElementById('photo-input').click()">添加照片</button>
    </div>
    <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="uploadPhoto(this)">
    <div class="card"><div class="photo-grid" id="photo-list"><div class="empty">还没有照片</div></div></div>
  </div>

  <!-- 纪念日 -->
  <div class="page" id="page-anniversary">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-weight:500;color:#e91e63;">纪念日</div>
      <button class="btn" onclick="openAnnModal()">添加</button>
    </div>
    <div class="card"><div id="ann-list"><div class="empty">还没有纪念日</div></div></div>
  </div>

  <!-- 心愿 -->
  <div class="page" id="page-wishlist">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-weight:500;color:#e91e63;">心愿清单</div>
      <button class="btn" onclick="openWishModal()">添加</button>
    </div>
    <div class="card"><div id="wish-list"><div class="empty">还没有心愿</div></div></div>
  </div>

  <!-- 设置 -->
  <div class="page" id="page-settings">
    <div class="card">
      <div class="card-title">基本设置</div>
      <div class="form-group">
        <label class="form-label">网站标题</label>
        <input type="text" id="set-title" value="我们的小窝">
      </div>
      <div class="form-group">
        <label class="form-label">TA的名字</label>
        <input type="text" id="set-name1" placeholder="TA的名字">
      </div>
      <div class="form-group">
        <label class="form-label">你的名字</label>
        <input type="text" id="set-name2" placeholder="你的名字">
      </div>
      <div class="form-group">
        <label class="form-label">在一起的日子</label>
        <input type="date" id="set-start-date">
      </div>
      <button class="btn" onclick="saveSettingsClick()">保存设置</button>
      <div id="save-result" style="margin-top:10px;font-size:13px;color:#666;"></div>
    </div>

    <div class="card">
      <div class="card-title">云端同步</div>
      <div class="form-group">
        <label class="form-label">API Key</label>
        <input type="text" id="cloud-key" placeholder="JSONBin API Key">
      </div>
      <div class="form-group">
        <label class="form-label">Bin ID</label>
        <input type="text" id="cloud-bin" placeholder="同步后自动填充">
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn" onclick="doSync()">同步到云端</button>
        <button class="btn-outline" onclick="doLoad()">从云端加载</button>
      </div>
      <div id="sync-msg" style="margin-top:10px;font-size:13px;"></div>
    </div>

    <div class="card">
      <div class="card-title">数据管理</div>
      <button class="btn-outline" onclick="exportData()">导出备份</button>
      <button class="btn-outline" onclick="clearData()" style="margin-left:10px;color:#e91e63;">清除数据</button>
    </div>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal" id="diary-modal">
  <div class="modal-content">
    <div class="modal-title">写日记</div>
    <div class="form-group"><label class="form-label">标题</label><input type="text" id="d-title"></div>
    <div class="form-group"><label class="form-label">内容</label><textarea id="d-content"></textarea></div>
    <div class="form-group"><label class="form-label">日期</label><input type="date" id="d-date"></div>
    <div class="form-group"><label class="form-label">作者</label><select id="d-author"><option>我</option><option>TA</option><option>一起</option></select></div>
    <div class="form-group"><label class="form-label">心情</label><select id="d-mood"><option>开心</option><option>甜蜜</option><option>感动</option><option>想念</option></select></div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal('diary-modal')">取消</button>
      <button class="btn" onclick="submitDiary()">保存</button>
    </div>
  </div>
</div>

<div class="modal" id="ann-modal">
  <div class="modal-content">
    <div class="modal-title">添加纪念日</div>
    <div class="form-group"><label class="form-label">名称</label><input type="text" id="a-name"></div>
    <div class="form-group"><label class="form-label">日期</label><input type="date" id="a-date"></div>
    <div class="form-group"><label class="form-label">备注</label><input type="text" id="a-note"></div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal('ann-modal')">取消</button>
      <button class="btn" onclick="submitAnn()">保存</button>
    </div>
  </div>
</div>

<div class="modal" id="wish-modal">
  <div class="modal-content">
    <div class="modal-title">添加心愿</div>
    <div class="form-group"><label class="form-label">内容</label><input type="text" id="w-text"></div>
    <div class="form-group"><label class="form-label">分类</label><select id="w-cat"><option>旅行</option><option>美食</option><option>生活</option><option>其他</option></select></div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal('wish-modal')">取消</button>
      <button class="btn" onclick="submitWish()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" style="display:none;"></div>

<script>
// ============ 数据 ============
var appData = {
  settings: { title: '我们的小窝', name1: '', name2: '', startDate: '' },
  diaries: [], photos: [], anniversaries: [], wishlist: []
};
var cloudCfg = {
  apiKey: '$2a$10$ddYMKOITk/Jwo8TOLiCJmeM3b.NxOKhk0j0ZdboR1sgr5q4nTEtnq',
  binId: '69f5e3bd856a68218999db49'
};

// ============ 初始化 ============
function init() {
  // 加载数据
  var saved = localStorage.getItem('couple_data_v2');
  if (saved) {
    try { appData = JSON.parse(saved); } catch(e) {}
  }
  var savedCloud = localStorage.getItem('couple_cloud_v2');
  if (savedCloud) {
    try { cloudCfg = JSON.parse(savedCloud); } catch(e) {}
  }
  
  // 填充表单
  document.getElementById('set-title').value = appData.settings.title || '我们的小窝';
  document.getElementById('set-name1').value = appData.settings.name1 || '';
  document.getElementById('set-name2').value = appData.settings.name2 || '';
  document.getElementById('set-start-date').value = appData.settings.startDate || '';
  document.getElementById('cloud-key').value = cloudCfg.apiKey || '';
  document.getElementById('cloud-bin').value = cloudCfg.binId || '';
  
  // 设置日期
  var now = new Date();
  var y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
  document.getElementById('d-date').value = y + '-' + m + '-' + d;
  
  renderHome();
}

// ============ 保存数据 ============
function saveData() {
  try {
    localStorage.setItem('couple_data_v2', JSON.stringify(appData));
    return true;
  } catch(e) {
    alert('保存失败: ' + e.message);
    return false;
  }
}

// ============ 页面切换 ============
function switchPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'home') renderHome();
}

// ============ 弹窗 ============
function openDiaryModal() { document.getElementById('diary-modal').classList.add('show'); }
function openAnnModal() { document.getElementById('ann-modal').classList.add('show'); }
function openWishModal() { document.getElementById('wish-modal').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ============ Toast ============
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2500);
}

// ============ 首页渲染 ============
function renderHome() {
  var title = appData.settings.title || '我们的小窝';
  document.getElementById('site-title').textContent = title;
  document.title = title;
  
  var n1 = appData.settings.name1 || 'TA';
  var n2 = appData.settings.name2 || '我';
  document.getElementById('home-names').textContent = '❤ ' + n1 + ' & ' + n2 + ' ❤';
  
  // 计算天数
  var days = 0;
  if (appData.settings.startDate) {
    var start = new Date(appData.settings.startDate);
    var now = new Date();
    days = Math.floor((now - start) / 86400000) + 1;
    if (days < 0) days = 0;
  }
  document.getElementById('love-days').textContent = days;
  document.getElementById('love-days2').textContent = days;
  
  // 统计
  document.getElementById('stat-diary').textContent = appData.diaries.length;
  document.getElementById('stat-photo').textContent = appData.photos.length;
  document.getElementById('stat-wish').textContent = appData.wishlist.filter(function(w) { return w.done; }).length + '/' + appData.wishlist.length;
  document.getElementById('stat-ann').textContent = appData.anniversaries.length;
  
  // 最近日记
  var list = document.getElementById('home-diary-list');
  if (appData.diaries.length === 0) {
    list.innerHTML = '<div class="empty">还没有日记</div>';
  } else {
    var recent = appData.diaries.slice().sort(function(a,b) { return b.date > a.date ? 1 : -1; }).slice(0, 3);
    list.innerHTML = recent.map(function(d) {
      return '<div class="diary-item" onclick="showDiary(\'' + d.id + '\')">' +
        '<div class="d-title">' + d.title + '</div>' +
        '<div class="d-date">' + d.date + ' · ' + d.mood + '</div></div>';
    }).join('');
  }
}

// ============ 日记 ============
function submitDiary() {
  var title = document.getElementById('d-title').value.trim();
  var content = document.getElementById('d-content').value.trim();
  var date = document.getElementById('d-date').value;
  var author = document.getElementById('d-author').value;
  var mood = document.getElementById('d-mood').value;
  
  if (!title || !content) { alert('请填写标题和内容'); return; }
  
  appData.diaries.push({
    id: Date.now().toString(),
    title: title,
    content: content,
    date: date,
    author: author,
    mood: mood
  });
  
  if (saveData()) {
    closeModal('diary-modal');
    document.getElementById('d-title').value = '';
    document.getElementById('d-content').value = '';
    renderDiaryList();
    renderHome();
    toast('日记已保存');
  }
}

function renderDiaryList() {
  var el = document.getElementById('diary-list');
  if (appData.diaries.length === 0) {
    el.innerHTML = '<div class="empty">还没有日记</div>';
    return;
  }
  var sorted = appData.diaries.slice().sort(function(a,b) { return b.date > a.date ? 1 : -1; });
  el.innerHTML = sorted.map(function(d) {
    return '<div class="diary-item" onclick="showDiary(\'' + d.id + '\')">' +
      '<div class="d-title">' + d.title + '</div>' +
      '<div class="d-date">' + d.date + ' · ' + d.mood + ' · ' + d.author + '</div></div>';
  }).join('');
}

function showDiary(id) {
  var d = null;
  for (var i = 0; i < appData.diaries.length; i++) {
    if (appData.diaries[i].id === id) { d = appData.diaries[i]; break; }
  }
  if (!d) return;
  var html = '<div style="margin-bottom:16px;">';
  html += '<div style="color:#999;font-size:12px;">' + d.date + ' · ' + d.mood + ' · ' + d.author + '</div>';
  html += '<div style="font-size:18px;font-weight:500;margin:10px 0;">' + d.title + '</div>';
  html += '<div style="color:#555;line-height:1.6;white-space:pre-wrap;">' + d.content + '</div></div>';
  html += '<button class="btn-outline" style="color:#e91e63;" onclick="deleteDiary(\'' + d.id + '\')">删除</button> ';
  html += '<button class="btn" onclick="closeModal(\'diary-modal\')">关闭</button>';
  
  document.getElementById('diary-modal').querySelector('.modal-content').innerHTML = html;
  document.getElementById('diary-modal').classList.add('show');
}

function deleteDiary(id) {
  if (!confirm('确定删除这篇日记?')) return;
  appData.diaries = appData.diaries.filter(function(d) { return d.id !== id; });
  saveData();
  closeModal('diary-modal');
  renderDiaryList();
  renderHome();
  toast('已删除');
}

// ============ 相册 ============
function uploadPhoto(input) {
  var files = Array.prototype.slice.call(input.files);
  if (!files.length) return;
  
  toast('正在处理...');
  var done = 0;
  
  files.forEach(function(file) {
    compressImg(file, function(src) {
      appData.photos.push({
        id: Date.now().toString() + done,
        src: src,
        name: file.name,
        date: new Date().toISOString().slice(0,10)
      });
      done++;
      if (done === files.length) {
        saveData();
        renderPhotoList();
        renderHome();
        toast('已添加' + files.length + '张照片');
      }
    });
  });
  
  input.value = '';
}

function compressImg(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var w = img.width, h = img.height;
      if (w > 1000) { h = h * 1000 / w; w = 1000; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderPhotoList() {
  var el = document.getElementById('photo-list');
  if (appData.photos.length === 0) {
    el.innerHTML = '<div class="empty">还没有照片</div>';
    return;
  }
  el.innerHTML = appData.photos.map(function(p) {
    return '<div class="photo-item" onclick="deletePhoto(\'' + p.id + '\')"><img src="' + p.src + '"></div>';
  }).join('');
}

function deletePhoto(id) {
  if (!confirm('删除这张照片?')) return;
  appData.photos = appData.photos.filter(function(p) { return p.id !== id; });
  saveData();
  renderPhotoList();
  renderHome();
}

// ============ 纪念日 ============
function submitAnn() {
  var name = document.getElementById('a-name').value.trim();
  var date = document.getElementById('a-date').value;
  var note = document.getElementById('a-note').value.trim();
  
  if (!name || !date) { alert('请填写名称和日期'); return; }
  
  appData.anniversaries.push({ id: Date.now().toString(), name: name, date: date, note: note });
  
  if (saveData()) {
    closeModal('ann-modal');
    document.getElementById('a-name').value = '';
    document.getElementById('a-note').value = '';
    renderAnnList();
    toast('纪念日已添加');
  }
}

function renderAnnList() {
  var el = document.getElementById('ann-list');
  if (appData.anniversaries.length === 0) {
    el.innerHTML = '<div class="empty">还没有纪念日</div>';
    return;
  }
  
  var today = new Date(); today.setHours(0,0,0,0);
  
  var items = appData.anniversaries.map(function(a) {
    var d = new Date(a.date);
    var thisYear = new Date(today.getFullYear(), d.getMonth(), d.getDate());
    if (thisYear < today) thisYear.setFullYear(today.getFullYear() + 1);
    var diff = Math.floor((thisYear - today) / 86400000);
    
    return '<div class="ann-item">' +
      '<div><div style="font-weight:500;">' + a.name + '</div>' +
      '<div style="font-size:12px;color:#999;">' + a.date + (a.note ? ' · ' + a.note : '') + '</div></div>' +
      '<div style="display:flex;align-items:center;gap:8px;">' +
      '<span class="ann-badge">' + (diff === 0 ? '就是今天!' : '还有' + diff + '天') + '</span>' +
      '<button class="btn-outline" style="padding:4px 8px;font-size:11px;" onclick="deleteAnn(\'' + a.id + '\')">删</button></div></div>';
  }).join('');
  
  el.innerHTML = items;
}

function deleteAnn(id) {
  appData.anniversaries = appData.anniversaries.filter(function(a) { return a.id !== id; });
  saveData();
  renderAnnList();
}

// ============ 心愿 ============
function submitWish() {
  var text = document.getElementById('w-text').value.trim();
  var cat = document.getElementById('w-cat').value;
  
  if (!text) { alert('请填写心愿内容'); return; }
  
  appData.wishlist.push({ id: Date.now().toString(), text: text, cat: cat, done: false });
  
  if (saveData()) {
    closeModal('wish-modal');
    document.getElementById('w-text').value = '';
    renderWishList();
    toast('心愿已添加');
  }
}

function renderWishList() {
  var el = document.getElementById('wish-list');
  if (appData.wishlist.length === 0) {
    el.innerHTML = '<div class="empty">还没有心愿</div>';
    return;
  }
  
  var todo = appData.wishlist.filter(function(w) { return !w.done; });
  var done = appData.wishlist.filter(function(w) { return w.done; });
  
  var html = '';
  if (todo.length) {
    html += todo.map(function(w) {
      return '<div class="wish-item">' +
        '<div class="wish-check" onclick="toggleWish(\'' + w.id + '\')"></div>' +
        '<div class="wish-text">' + w.text + '</div>' +
        '<button class="btn-outline" style="padding:4px 8px;font-size:11px;" onclick="deleteWish(\'' + w.id + '\')">删</button></div>';
    }).join('');
  }
  if (done.length) {
    html += '<div style="font-size:12px;color:#ccc;margin:10px 0;">已实现 (' + done.length + ')</div>';
    html += done.map(function(w) {
      return '<div class="wish-item">' +
        '<div class="wish-check done" onclick="toggleWish(\'' + w.id + '\')"></div>' +
        '<div class="wish-text done">' + w.text + '</div></div>';
    }).join('');
  }
  
  el.innerHTML = html;
}

function toggleWish(id) {
  for (var i = 0; i < appData.wishlist.length; i++) {
    if (appData.wishlist[i].id === id) {
      appData.wishlist[i].done = !appData.wishlist[i].done;
      break;
    }
  }
  saveData();
  renderWishList();
  renderHome();
}

function deleteWish(id) {
  appData.wishlist = appData.wishlist.filter(function(w) { return w.id !== id; });
  saveData();
  renderWishList();
  renderHome();
}

// ============ 设置 ============
function saveSettingsClick() {
  var result = document.getElementById('save-result');
  result.textContent = '正在保存...';
  result.style.color = '#666';
  
  appData.settings.title = document.getElementById('set-title').value || '我们的小窝';
  appData.settings.name1 = document.getElementById('set-name1').value;
  appData.settings.name2 = document.getElementById('set-name2').value;
  appData.settings.startDate = document.getElementById('set-start-date').value;
  
  cloudCfg.apiKey = document.getElementById('cloud-key').value;
  cloudCfg.binId = document.getElementById('cloud-bin').value;
  
  try {
    localStorage.setItem('couple_data_v2', JSON.stringify(appData));
    localStorage.setItem('couple_cloud_v2', JSON.stringify(cloudCfg));
    result.textContent = '✓ 保存成功 ' + new Date().toLocaleTimeString();
    result.style.color = '#4caf50';
    renderHome();
  } catch(e) {
    result.textContent = '✗ 保存失败: ' + e.message;
    result.style.color = '#e91e63';
  }
}

// ============ 云同步 ============
function doSync() {
  var msg = document.getElementById('sync-msg');
  var k = document.getElementById('cloud-key').value.trim();
  var b = document.getElementById('cloud-bin').value.trim();
  
  if (!k || !b) {
    msg.textContent = '请先填写API Key和Bin ID';
    msg.style.color = '#e91e63';
    return;
  }
  
  cloudCfg.apiKey = k;
  cloudCfg.binId = b;
  localStorage.setItem('couple_cloud_v2', JSON.stringify(cloudCfg));
  
  msg.textContent = '同步中...';
  msg.style.color = '#666';
  
  var xhr = new XMLHttpRequest();
  xhr.open('PUT', 'https://api.jsonbin.io/v3/b/' + b, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('X-Master-Key', k);
  
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var res = JSON.parse(xhr.responseText);
        if (res.metadata && res.metadata.id) {
          cloudCfg.binId = res.metadata.id;
          document.getElementById('cloud-bin').value = cloudCfg.binId;
          localStorage.setItem('couple_cloud_v2', JSON.stringify(cloudCfg));
        }
      } catch(e) {}
      msg.textContent = '✓ 同步成功 ' + new Date().toLocaleTimeString();
      msg.style.color = '#4caf50';
      document.getElementById('sync-indicator').textContent = '已同步';
      toast('同步成功!');
    } else {
      msg.textContent = '✗ 同步失败: ' + xhr.status;
      msg.style.color = '#e91e63';
    }
  };
  
  xhr.onerror = function() {
    msg.textContent = '✗ 网络错误';
    msg.style.color = '#e91e63';
  };
  
  xhr.send(JSON.stringify(appData));
}

function doLoad() {
  var msg = document.getElementById('sync-msg');
  var k = document.getElementById('cloud-key').value.trim();
  var b = document.getElementById('cloud-bin').value.trim();
  
  if (!k || !b) {
    msg.textContent = '请先填写API Key和Bin ID';
    msg.style.color = '#e91e63';
    return;
  }
  
  msg.textContent = '加载中...';
  msg.style.color = '#666';
  
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.jsonbin.io/v3/b/' + b + '/latest', true);
  xhr.setRequestHeader('X-Master-Key', k);
  
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var res = JSON.parse(xhr.responseText);
        if (res.record) {
          appData = res.record;
          saveData();
          // 更新表单
          document.getElementById('set-title').value = appData.settings.title || '我们的小窝';
          document.getElementById('set-name1').value = appData.settings.name1 || '';
          document.getElementById('set-name2').value = appData.settings.name2 || '';
          document.getElementById('set-start-date').value = appData.settings.startDate || '';
          renderHome();
          renderDiaryList();
          renderPhotoList();
          renderAnnList();
          renderWishList();
          msg.textContent = '✓ 加载成功';
          msg.style.color = '#4caf50';
          toast('加载成功!');
        }
      } catch(e) {
        msg.textContent = '数据解析失败';
        msg.style.color = '#e91e63';
      }
    } else {
      msg.textContent = '✗ 加载失败: ' + xhr.status;
      msg.style.color = '#e91e63';
    }
  };
  
  xhr.onerror = function() {
    msg.textContent = '✗ 网络错误';
    msg.style.color = '#e91e63';
  };
  
  xhr.send();
}

// ============ 数据管理 ============
function exportData() {
  var blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('已导出');
}

function clearData() {
  if (confirm('确定清除所有数据?') && confirm('再次确认?')) {
    localStorage.removeItem('couple_data_v2');
    localStorage.removeItem('couple_cloud_v2');
    location.reload();
  }
}

// ============ 启动 ============
init();
</script>
</body>
</html>
